name: Build and deploy Powershell project to Azure Function App - abeggiii

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Install PowerShell modules locally in pipeline
      - name: Install Az modules
        shell: pwsh
        run: |
          mkdir -p ./Modules
          Save-Module -Name Az.Accounts -Path ./Modules -Force
          Save-Module -Name Az.Compute -Path ./Modules -Force

      # ✅ Validate structure (important for debugging)
      - name: Verify folder structure
        run: |
          echo "Listing repo structure:"
          ls -R

      # ✅ Azure login
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A7D0EE5B70DF4A338E0B5F824101DEE1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_00F5C6E2B7D045DFB1CFB7EBB20E1CF8 }}
          subscription-id: "46b0a57d-6e48-444c-9cd0-61977a389531"

      # ✅ Deploy packaged app WITH Modules folder
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'abeggiii'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
